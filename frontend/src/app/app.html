<div class="page-wrapper">
  <!-- Ambient Background Effects -->
  <div class="ambient-glow ambient-glow--1"></div>
  <div class="ambient-glow ambient-glow--2"></div>

  <!-- Theme Toggle -->
  <button id="theme-toggle" class="theme-toggle" (click)="toggleTheme()"
    [attr.aria-label]="themeService.isDarkMode() ? 'Mudar para modo claro' : 'Mudar para modo escuro'">
    @if (themeService.isDarkMode()) {
    <!-- Sun icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4" />
      <path d="M12 2v2" />
      <path d="M12 20v2" />
      <path d="m4.93 4.93 1.41 1.41" />
      <path d="m17.66 17.66 1.41 1.41" />
      <path d="M2 12h2" />
      <path d="M20 12h2" />
      <path d="m6.34 17.66-1.41 1.41" />
      <path d="m19.07 4.93-1.41 1.41" />
    </svg>
    } @else {
    <!-- Moon icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
    </svg>
    }
  </button>

  <!-- Hero Section -->
  <main class="hero-section" [class.searched]="hasSearched()">
    <!-- Logo Placeholder -->
    <div class="logo-area">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <circle cx="12" cy="12" r="3" />
          <path d="M12 2v4" />
          <path d="M12 18v4" />
          <path d="M4.93 4.93l2.83 2.83" />
          <path d="M16.24 16.24l2.83 2.83" />
          <path d="M2 12h4" />
          <path d="M18 12h4" />
        </svg>
      </div>
      <h1 class="app-title">
        Rec<span class="title-accent">fy</span>
      </h1>
      <p class="app-subtitle">Descubra músicas semelhantes às suas favoritas</p>
    </div>

    <!-- Search Bar -->
    <app-search-bar (search)="onSearch($event)" />
  </main>

  <!-- Loading -->
  @if (isLoading()) {
  <div class="loading-section">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
    </div>
    <p class="loading-text">Buscando recomendações...</p>
  </div>
  }

  <!-- Results Section -->
  @if (hasSearched() && !isLoading()) {
  <section class="results-section" id="results">
    <div class="results-header">
      <h2 class="results-title">
        Músicas semelhantes a
        <span class="results-highlight">"{{ searchedQuery() }}"</span>
      </h2>
      <div class="results-divider"></div>
    </div>

    <div class="cards-grid">
      @for (song of recommendedSongs(); track song.title; let i = $index) {
      <app-music-card [music]="song" [index]="i" />
      }
    </div>
  </section>
  }

  <!-- Footer -->
  <footer class="footer">
    <p>Desenvolvido com <span class="heart">♥</span> para IML</p>
  </footer>
</div>
